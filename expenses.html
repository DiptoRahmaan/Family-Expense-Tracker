<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { animation: fadeIn 0.4s ease-out; }
        .slide-up { animation: slideUp 0.5s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://xhcrkmmowcjsjiqdqcmb.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoY3JrbW1vd2Nqc2ppcWRxY21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzE2NjksImV4cCI6MjA5NjI0NzY2OX0.Pf71TqC4YZvvtcH17tH1CgWfDLPvKXodVP0FvPjXzIA');

        const stickerStyles = { 'Must': 'bg-red-100 text-red-700 border-red-100', 'Need': 'bg-blue-100 text-blue-700 border-blue-100', 'Want': 'bg-fuchsia-100 text-fuchsia-700 border-fuchsia-100' };

        async function fetchHistory() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const { data } = await supabase.from('transactions').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('history-list');
            
            if (data.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 opacity-70 slide-up">
                        <svg class="w-20 h-20 mb-6 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                        <p class="text-base font-bold text-gray-800 tracking-tight">No Transactions Yet</p>
                        <p class="text-xs text-gray-400 mt-1">Your family ledger is currently empty.</p>
                    </div>`;
                return;
            }

            list.innerHTML = data.map((tx, i) => {
                const isExpense = tx.type === 'expense';
                const dateStr = new Date(tx.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                const sticker = (isExpense && tx.priority) ? `<span class="px-2 py-0.5 rounded-md border text-[9px] font-bold uppercase tracking-wider ${stickerStyles[tx.priority] || 'bg-gray-100'}">${tx.priority}</span>` : '';

                return `
                <div class="flex items-center justify-between bg-white p-4 rounded-[20px] shadow-sm border border-gray-100 mb-3 slide-up" style="animation-delay: ${i * 30}ms">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <p class="font-bold text-sm text-gray-800">${tx.description}</p>
                            ${sticker}
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">${isExpense ? tx.category : 'System Top-Up'}</span>
                            <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                            <span class="text-[10px] text-gray-400">${dateStr}</span>
                        </div>
                    </div>
                    <p class="font-bold text-sm ${isExpense ? 'text-gray-900' : 'text-green-500'}">
                        ${isExpense ? '-' : '+'}${Number(tx.amount).toFixed(2)}
                    </p>
                </div>
            `}).join('');
        }
        fetchHistory();
    </script>
</head>
<body class="bg-gray-50 font-sans p-5 pb-24">
    <div class="mb-6 slide-up">
        <h1 class="text-2xl font-bold tracking-tight">Ledger History</h1>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mt-1">Shared Family Wallet</p>
    </div>
    
    <div id="history-list">
        <!-- Shimmer Loaders -->
        <div class="bg-white p-4 rounded-[20px] shadow-sm border border-gray-100 mb-3 flex justify-between items-center">
            <div class="space-y-2"><div class="skeleton w-32 h-4"></div><div class="skeleton w-24 h-3"></div></div><div class="skeleton w-16 h-5"></div>
        </div>
        <div class="bg-white p-4 rounded-[20px] shadow-sm border border-gray-100 mb-3 flex justify-between items-center opacity-80">
            <div class="space-y-2"><div class="skeleton w-40 h-4"></div><div class="skeleton w-20 h-3"></div></div><div class="skeleton w-12 h-5"></div>
        </div>
        <div class="bg-white p-4 rounded-[20px] shadow-sm border border-gray-100 mb-3 flex justify-between items-center opacity-60">
            <div class="space-y-2"><div class="skeleton w-24 h-4"></div><div class="skeleton w-28 h-3"></div></div><div class="skeleton w-14 h-5"></div>
        </div>
    </div>
    <script src="nav.js"></script>
</body>
</html>
